machine:
  disks:
    - device: /dev/disk/by-id/scsi-0Google_PersistentDisk_data
      partitions:
        - mountpoint: /var/mnt/data
  kubelet:
    extraMounts:
      - destination: /var/mnt/data
        type: bind
        source: /var/mnt/data
        options:
          - bind
          - rshared
          - rw
