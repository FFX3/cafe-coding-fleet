apiVersion: v1
kind: ConfigMap
metadata:
  name: frappe-provision-script
  namespace: frappe
data:
  provision.sh: |
    #!/bin/bash
    set -e
    set -o pipefail

    # Set up PATH for frappe tools (bench, node, etc.)
    export PATH="/home/frappe/.local/bin:/home/frappe/.nvm/versions/node/v24.13.0/bin:$PATH"

    # Pre-built assets location
    GCS_BUCKET="cafe-coding-fleet-talos-images"
    GCS_PREFIX="frappe"
    BENCH_DIR="/var/frappe/frappe-bench"

    # GCS authenticated download using service account
    gcs_download() {
        local gcs_path="$1"
        local dest_path="$2"
        echo "Downloading gs://${GCS_BUCKET}/${gcs_path}..."
        gcloud auth activate-service-account --key-file=/secrets/gcs-service-account.json --quiet
        gsutil cp "gs://${GCS_BUCKET}/${gcs_path}" "$dest_path"
        echo "Downloaded to $dest_path"
    }

    # Parse apps from config
    get_apps() {
        python3 << 'PYEOF'
    import yaml
    with open('/config/config.yaml') as f:
        config = yaml.safe_load(f)
    for app in config.get('apps', []):
        print(f"{app['name']}|{app['url']}|{app['branch']}")
    PYEOF
    }

    # Parse sites from config
    get_sites() {
        python3 << 'PYEOF'
    import yaml
    with open('/config/config.yaml') as f:
        config = yaml.safe_load(f)
    for site in config.get('sites', []):
        apps = ','.join(site.get('install_apps', []))
        print(f"{site['hostname']}|{site['db_name']}|{apps}")
    PYEOF
    }

    # Check if we need to download/update the bench
    needs_update() {
        # No bench = definitely needs download
        if [ ! -d "$BENCH_DIR/apps/frappe" ]; then
            echo "No bench found, needs fresh install"
            return 0
        fi

        # No local manifest = old install, needs update
        if [ ! -f "$BENCH_DIR/manifest.json" ]; then
            echo "No local manifest found, needs update"
            return 0
        fi

        # Compare manifests
        echo "Checking for updates..."
        if ! gcs_download "$GCS_PREFIX/manifest.json" /tmp/remote-manifest.json 2>/dev/null; then
            echo "WARNING: Could not fetch remote manifest, skipping update check"
            return 1
        fi

        if ! diff -q "$BENCH_DIR/manifest.json" /tmp/remote-manifest.json >/dev/null 2>&1; then
            echo "Manifest changed, needs update"
            local_date=$(python3 -c "import sys,json; print(json.load(open('$BENCH_DIR/manifest.json')).get('build_date','unknown'))")
            remote_date=$(python3 -c "import sys,json; print(json.load(open('/tmp/remote-manifest.json')).get('build_date','unknown'))")
            echo "  Local:  $local_date"
            echo "  Remote: $remote_date"
            return 0
        fi

        echo "Manifests match, no update needed"
        return 1
    }

    echo "=== Starting Frappe provisioning ==="

    echo "[STEP 1/6] Verifying database connectivity and creating databases..."
    pip install --quiet pyyaml google-cloud-storage

    get_sites | while IFS='|' read -r site db_name install_apps; do
        # Look up per-site passwords from mounted secret files
        site_db_password=$(cat "/secrets/${db_name}_DB_PASSWORD")
        site_admin_password=$(cat "/secrets/${db_name}_ADMIN_PASSWORD")

        if [ -z "$site_db_password" ] || [ -z "$site_admin_password" ]; then
            echo "ERROR: Missing credentials for site $site (db_name: $db_name)"
            echo "  Expected secret keys: ${db_name}_DB_PASSWORD, ${db_name}_ADMIN_PASSWORD"
            exit 1
        fi

        # Create database if not exists
        echo "Ensuring database $db_name exists..."
        if ! PGPASSWORD="$POSTGRES_PASSWORD" psql -h postgres.postgres.svc.cluster.local -U postgres -lqt | cut -d \| -f 1 | grep -qw "$db_name"; then
            echo "Creating database $db_name..."
            PGPASSWORD="$POSTGRES_PASSWORD" psql -h postgres.postgres.svc.cluster.local -U postgres -c "CREATE DATABASE $db_name"
        else
            echo "Database $db_name already exists"
        fi

        # Create user if not exists, ensure LOGIN and correct password
        echo "Ensuring user ${db_name} exists with correct password..."
        PGPASSWORD="$POSTGRES_PASSWORD" psql -h postgres.postgres.svc.cluster.local -U postgres <<EOSQL
    DO \$\$
    BEGIN
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '${db_name}') THEN
            CREATE USER ${db_name} WITH LOGIN PASSWORD '$site_db_password';
        ELSE
            ALTER USER ${db_name} WITH LOGIN PASSWORD '$site_db_password';
        END IF;
    END
    \$\$;
    GRANT ALL PRIVILEGES ON DATABASE $db_name TO ${db_name};
    ALTER DATABASE $db_name OWNER TO ${db_name};
    EOSQL

        # Verify the user can actually connect
        echo "Verifying database connection as ${db_name}..."
        if ! PGPASSWORD="$site_db_password" psql -h postgres.postgres.svc.cluster.local -U "$db_name" -d "$db_name" -c "SELECT 1" >/dev/null 2>&1; then
            echo "ERROR: Cannot connect to database $db_name as user $db_name"
            echo "Check pg_hba.conf allows password authentication"
            exit 1
        fi
        echo "Database connection verified"
    done

    echo "[STEP 2/6] Checking pre-built assets..."
    cd /var/frappe

    if needs_update; then
        # Backup existing sites if any
        if [ -d "$BENCH_DIR/sites" ]; then
            echo "Backing up existing sites..."
            cp -a "$BENCH_DIR/sites" /tmp/sites-backup
        fi

        # Remove old bench (keep backup)
        if [ -d "$BENCH_DIR" ]; then
            echo "Removing old bench..."
            rm -rf "$BENCH_DIR"
        fi

        # Download and extract
        gcs_download "$GCS_PREFIX/frappe-bench-latest.tar.gz" /tmp/frappe-bench.tar.gz
        echo "Extracting tarball..."
        tar -xzf /tmp/frappe-bench.tar.gz
        rm /tmp/frappe-bench.tar.gz

        # Restore sites
        if [ -d /tmp/sites-backup ]; then
            echo "Restoring sites..."
            rm -rf "$BENCH_DIR/sites"
            mv /tmp/sites-backup "$BENCH_DIR/sites"
        fi

        # Reinstall Python packages (absolute paths in venv don't work after extract)
        cd "$BENCH_DIR"
        echo "Reinstalling Python packages..."
        ./env/bin/pip install -q -e apps/frappe
        for app in apps/*/; do
            app_name=$(basename "$app")
            if [ "$app_name" != "frappe" ] && [ -f "$app/setup.py" ] || [ -f "$app/pyproject.toml" ]; then
                echo "  Installing $app_name..."
                ./env/bin/pip install -q -e "$app"
            fi
        done
    else
        echo "Using existing bench installation"
    fi

    cd "$BENCH_DIR"

    # Ensure sites directory exists
    mkdir -p sites

    echo "[STEP 3/6] Configuring Redis and database..."
    cat > sites/common_site_config.json <<EOF
    {
        "db_type": "postgres",
        "db_host": "postgres.postgres.svc.cluster.local",
        "db_port": 5432,
        "redis_cache": "redis://redis-cache.frappe.svc.cluster.local:6379",
        "redis_queue": "redis://redis-queue.frappe.svc.cluster.local:6379",
        "socketio_port": 9000
    }
    EOF

    echo "[STEP 4/6] Verifying apps are present..."
    get_apps | while IFS='|' read -r app url branch; do
        if [ ! -d "apps/$app" ]; then
            echo "ERROR: App $app not found in pre-built tarball"
            echo "Rebuild assets with: ./scripts/build-frappe-assets.sh"
            exit 1
        else
            echo "App $app present"
        fi
    done

    echo "[STEP 5/6] Creating sites and installing apps..."
    get_sites | while IFS='|' read -r site db_name install_apps; do
        echo "Processing site: $site"

        # Look up per-site passwords (already validated in step 1)
        site_db_password=$(cat "/secrets/${db_name}_DB_PASSWORD")
        site_admin_password=$(cat "/secrets/${db_name}_ADMIN_PASSWORD")

        # Create site if not exists
        # The db user owns the database, so it acts as "root" for Frappe
        if [ ! -d "sites/$site" ]; then
            echo "Creating new site: $site"
            echo ">>> bench new-site starting at $(date)"
            if ! bench new-site "$site" \
                --db-name "$db_name" \
                --db-host postgres.postgres.svc.cluster.local \
                --db-root-username postgres \
                --db-root-password "$POSTGRES_PASSWORD" \
                --db-password "$site_db_password" \
                --admin-password "$site_admin_password" \
                --db-type postgres \
                --verbose 2>&1; then
                echo "ERROR: bench new-site failed!"
                exit 1
            fi
            echo ">>> bench new-site completed at $(date)"

            # Verify tables were created
            echo "Verifying database schema was created..."
            table_count=$(PGPASSWORD="$site_db_password" psql -h postgres.postgres.svc.cluster.local -U "$db_name" -d "$db_name" -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public';" 2>&1)
            if [[ "$table_count" -lt 1 ]]; then
                echo "ERROR: bench new-site did not create database tables!"
                echo "Table count: $table_count"
                exit 1
            fi
            echo "Database schema verified: $table_count tables created"
        else
            echo "Site $site already exists"
        fi

        # Install apps on site
        echo "Installing apps on site $site..."
        for app in $(echo "$install_apps" | tr ',' ' '); do
            if [ -n "$app" ]; then
                echo "  Installing app: $app"
                if ! bench --site "$site" install-app "$app"; then
                    echo "  ERROR: Failed to install app $app"
                    exit 1
                fi
            fi
        done

        # Run migrations
        echo "Running migrations for $site..."
        if ! bench --site "$site" migrate; then
            echo "ERROR: Migration failed for $site"
            exit 1
        fi
    done

    echo "[STEP 6/6] Assets already built, skipping bench build"

    echo "[COMPLETE] Frappe provisioning finished"
