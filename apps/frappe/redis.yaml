apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: frappe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis-cache
          image: redis:7-alpine
          args: ["--port", "6379", "--maxmemory", "100mb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - containerPort: 6379
              name: cache
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
        - name: redis-queue
          image: redis:7-alpine
          args: ["--port", "6380"]
          ports:
            - containerPort: 6380
              name: queue
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-cache
  namespace: frappe
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-queue
  namespace: frappe
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6380
