apiVersion: apps/v1
kind: Deployment
metadata:
  name: frappe
  namespace: frappe
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: frappe
  template:
    metadata:
      labels:
        app: frappe
    spec:
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /var/frappe"]
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: frappe-bench
              mountPath: /var/frappe
        - name: provision-sites
          image: frappe/bench:latest
          command: ["/bin/bash", "/scripts/provision.sh"]
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frappe-credentials
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: frappe-bench
              mountPath: /var/frappe
            - name: sites-config
              mountPath: /config
            - name: provision-script
              mountPath: /scripts
            - name: credentials
              mountPath: /secrets
              readOnly: true
            - name: gcs-credentials
              mountPath: /secrets/gcs-service-account.json
              subPath: gcs-service-account.json
              readOnly: true
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      containers:
        - name: gunicorn
          image: frappe/bench:latest
          command: ["bash", "-c"]
          args:
            - |
              cd /var/frappe/frappe-bench
              bench serve --port 8000
          ports:
            - containerPort: 8000
              name: web
          volumeMounts:
            - name: frappe-bench
              mountPath: /var/frappe
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/method/ping
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/method/ping
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
        - name: socketio
          image: frappe/bench:latest
          command: ["bash", "-c"]
          args:
            - |
              cd /var/frappe/frappe-bench
              node apps/frappe/socketio.js
          ports:
            - containerPort: 9000
              name: socketio
          volumeMounts:
            - name: frappe-bench
              mountPath: /var/frappe
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
        - name: worker
          image: frappe/bench:latest
          command: ["bash", "-c"]
          args:
            - |
              cd /var/frappe/frappe-bench
              bench worker --queue default
          volumeMounts:
            - name: frappe-bench
              mountPath: /var/frappe
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
        - name: scheduler
          image: frappe/bench:latest
          command: ["bash", "-c"]
          args:
            - |
              cd /var/frappe/frappe-bench
              bench schedule
          volumeMounts:
            - name: frappe-bench
              mountPath: /var/frappe
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: frappe-bench
          persistentVolumeClaim:
            claimName: frappe-pvc
        - name: sites-config
          configMap:
            name: frappe-sites
        - name: provision-script
          configMap:
            name: frappe-provision-script
            defaultMode: 0755
        - name: credentials
          secret:
            secretName: frappe-credentials
        - name: gcs-credentials
          secret:
            secretName: frappe-gcs-credentials
