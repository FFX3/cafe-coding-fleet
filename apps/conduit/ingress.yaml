apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: conduit
  namespace: conduit
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - matrix.justinmcintyre.com
      secretName: conduit-tls
  rules:
    - host: matrix.justinmcintyre.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: conduit
                port:
                  number: 6167
