apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gotrue
  namespace: gotrue
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - auth.justinmcintyre.com
      secretName: gotrue-tls
  rules:
    - host: auth.justinmcintyre.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gotrue
                port:
                  number: 9999
