apiVersion: apps/v1
kind: Deployment
metadata:
  name: twenty-server
  namespace: twenty
spec:
  replicas: 1
  selector:
    matchLabels:
      app: twenty-server
  template:
    metadata:
      labels:
        app: twenty-server
    spec:
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /app/packages/twenty-server/.local-storage"]
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: twenty-storage
              mountPath: /app/packages/twenty-server/.local-storage
      containers:
        - name: twenty-server
          image: twentycrm/twenty:latest
          command: ["sh", "-c", "yarn database:init:prod && yarn start:prod"]
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: twenty-credentials
          env:
            - name: NODE_PORT
              value: "3000"
            - name: SERVER_URL
              value: "https://crm.justinmcintyre.com"
            - name: FRONT_BASE_URL
              value: "https://crm.justinmcintyre.com"
            - name: REDIS_URL
              value: "redis://redis.twenty.svc.cluster.local:6379"
            - name: STORAGE_TYPE
              value: "local"
            - name: STORAGE_LOCAL_PATH
              value: ".local-storage"
            - name: DISABLE_DB_MIGRATIONS
              value: "false"
            - name: SIGN_IN_PREFILLED
              value: "false"
            - name: IS_BILLING_ENABLED
              value: "false"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: twenty-storage
              mountPath: /app/packages/twenty-server/.local-storage
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: twenty-storage
          persistentVolumeClaim:
            claimName: twenty-server-pvc
