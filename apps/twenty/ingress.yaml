apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: twenty
  namespace: twenty
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - crm.justinmcintyre.com
      secretName: twenty-tls
  rules:
    - host: crm.justinmcintyre.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: twenty-server
                port:
                  number: 3000
