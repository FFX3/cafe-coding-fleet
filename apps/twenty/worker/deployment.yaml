apiVersion: apps/v1
kind: Deployment
metadata:
  name: twenty-worker
  namespace: twenty
spec:
  replicas: 1
  selector:
    matchLabels:
      app: twenty-worker
  template:
    metadata:
      labels:
        app: twenty-worker
    spec:
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: twenty-worker
          image: twentycrm/twenty:latest
          command: ["yarn", "worker:prod"]
          envFrom:
            - secretRef:
                name: twenty-credentials
          env:
            - name: NODE_PORT
              value: "3000"
            - name: SERVER_URL
              value: "https://crm.justinmcintyre.com"
            - name: FRONT_BASE_URL
              value: "https://crm.justinmcintyre.com"
            - name: REDIS_URL
              value: "redis://redis.twenty.svc.cluster.local:6379"
            - name: STORAGE_TYPE
              value: "local"
            - name: STORAGE_LOCAL_PATH
              value: ".local-storage"
            - name: DISABLE_DB_MIGRATIONS
              value: "true"
            - name: IS_BILLING_ENABLED
              value: "false"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: twenty-storage
              mountPath: /app/packages/twenty-server/.local-storage
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "300m"
      volumes:
        - name: twenty-storage
          persistentVolumeClaim:
            claimName: twenty-server-pvc
