apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: studio
  namespace: studio
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - studio.justinmcintyre.com
      secretName: studio-tls
  rules:
    - host: studio.justinmcintyre.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: studio
                port:
                  number: 3000
